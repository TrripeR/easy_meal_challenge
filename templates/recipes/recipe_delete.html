{% extends "base.html" %}

{% block title %}Delete Recipe{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-5">

        <div class="card shadow-sm text-center p-4">

            <h4 class="mb-3">Delete Recipe</h4>

            <p class="text-muted">
                Are you sure you want to delete <strong>{{ object.title }}</strong>?
            </p>

            <form method="post">
                {% csrf_token %}

                <button class="btn btn-danger me-2">Delete</button>
                <a href="{% url 'recipe-details' object.pk %}" class="btn btn-outline-dark">
                    Cancel
                </a>
            </form>

        </div>

    </div>
</div>

{% endblock %}
