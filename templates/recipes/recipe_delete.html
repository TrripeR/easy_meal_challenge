{% extends "base.html" %}
{% block title %}Delete Recipe{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4 text-center text-danger">Delete Recipe</h1>

        <div class="card border-danger">
            <div class="card-body">
                <p>Are you sure you want to delete the recipe <strong>{{ recipe.title }}</strong>?</p>
                <p class="text-warning">This action cannot be undone!</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'recipe-details' recipe.pk %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
